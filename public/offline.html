<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f1115">
    <title>Sem conexão — Finba.se</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(160deg, #14171d 0%, #0f1115 55%, #0b0d11 100%);
            color: #e4e4e7;
        }

        .card {
            width: 100%;
            max-width: 26rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            background: linear-gradient(145deg, rgba(39, 39, 42, 0.98), rgba(24, 24, 27, 0.94));
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            padding: 1.75rem 1.5rem;
            text-align: center;
        }

        .icon {
            width: 4rem;
            height: 4rem;
            margin: 0 auto 1rem;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #0f1115;
        }

        .icon img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.3;
            color: #f4f4f5;
        }

        p {
            margin: 0 0 1.5rem;
            color: #a1a1aa;
            font-size: 0.95rem;
            line-height: 1.55;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 0.75rem;
            background: #16c04b;
            color: #04130a;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.85rem 1.25rem;
            min-height: 2.75rem;
            cursor: pointer;
            width: 100%;
        }

        button:focus-visible {
            outline: 2px solid #86efac;
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="icon" aria-hidden="true">
            <img src="/pwa/icon-192x192.png" alt="" width="192" height="192">
        </div>

        <h1>Você está sem conexão</h1>

        <p>
            O Finba.se precisa de internet para acessar e salvar seus dados financeiros.
        </p>

        <button type="button" onclick="window.location.reload()">
            Tentar novamente
        </button>
    </main>
</body>
</html>
