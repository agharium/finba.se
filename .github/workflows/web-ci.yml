name: web-ci

# Laravel app checks. Run from apps/web.
# Production main deploys for web remain script-based (see apps/web/docs/deployment.md).

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches-ignore:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

defaults:
  run:
    working-directory: apps/web

jobs:
  test:
    name: PHP test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_sqlite, pdo_pgsql, gd, intl, zip, bcmath, exif
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/web/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install npm dependencies and build assets
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Pint (dirty check)
        run: vendor/bin/pint --test

      - name: Tests
        env:
          APP_ENV: testing
        run: php artisan test --compact
